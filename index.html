<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBill | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-gray-200 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">
            AuraBill Dashboard
        </h1>
        <p class="text-slate-400 mt-2">IT Billing Management System</p>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-slate-800/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-slate-700/50 lg:col-span-1 h-fit">
            <h2 class="text-xl font-semibold mb-6 text-white flex items-center">
                Create New Invoice
            </h2>
            <form id="invoiceForm" class="space-y-5">
                <input type="text" id="clientName" placeholder="Client Name" required class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                <input type="email" id="clientEmail" placeholder="Client Email" required class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                <input type="tel" id="clientPhone" placeholder="Phone Number" required class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                <input type="text" id="serviceDesc" placeholder="Service (e.g. Cloud Setup)" required class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                <input type="number" id="amount" placeholder="Amount ($)" required class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                
                <button type="submit" id="submitBtn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-3 rounded-lg transition-all active:scale-95">
                    Generate & Send PDF
                </button>
            </form>
            <p id="statusMsg" class="mt-4 text-center text-sm hidden"></p>
        </div>

        <div class="bg-slate-800/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-slate-700/50 lg:col-span-2">
            <h2 class="text-xl font-semibold mb-6 text-white">Recent Invoices</h2>
            <div class="overflow-x-auto rounded-xl border border-slate-700/50">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/80 text-slate-300 text-sm">
                        <tr>
                            <th class="p-4 font-semibold">ID</th>
                            <th class="p-4 font-semibold">Client</th>
                            <th class="p-4 font-semibold">Amount</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody" class="divide-y divide-slate-700/50">
                        </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden text-center py-12 text-slate-500">No invoices yet.</div>
        </div>
    </div>

    <script>
        // CREATE INVOICE
        document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.classList.remove('hidden');
            statusMsg.textContent = "Sending...";
            statusMsg.className = "mt-4 text-center text-sm text-yellow-400";

            const payload = {
                clientName: document.getElementById('clientName').value,
                clientEmail: document.getElementById('clientEmail').value,
                clientPhone: document.getElementById('clientPhone').value,
                serviceDesc: document.getElementById('serviceDesc').value,
                amount: document.getElementById('amount').value,
            };

            try {
                const res = await fetch('http://localhost:3000/api/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    statusMsg.textContent = "Invoice Sent!";
                    statusMsg.className = "mt-4 text-center text-sm text-emerald-400";
                    document.getElementById('invoiceForm').reset();
                    loadDashboardData();
                }
            } catch (err) {
                statusMsg.textContent = "Error connecting to server.";
                statusMsg.className = "mt-4 text-center text-sm text-red-400";
            }
        });

        // DELETE FUNCTIONALITY
        async function deleteInvoice(id) {
            if (!confirm(`Are you sure you want to delete ${id}?`)) return;

            try {
                const res = await fetch(`http://localhost:3000/api/invoices/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    loadDashboardData();
                }
            } catch (err) {
                alert("Could not delete. Server error.");
            }
        }

        // LOAD TABLE DATA
        async function loadDashboardData() {
            try {
                const response = await fetch('http://localhost:3000/api/invoices');
                const data = await response.json();
                const tbody = document.getElementById('invoiceTableBody');
                const emptyState = document.getElementById('emptyState');
                
                tbody.innerHTML = '';
                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    data.forEach(inv => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-slate-700/30 transition-colors">
                                <td class="p-4 text-cyan-400 font-medium">${inv.id}</td>
                                <td class="p-4">
                                    <div class="text-white">${inv.clientName}</div>
                                    <div class="text-xs text-slate-500">${inv.clientEmail}</div>
                                </td>
                                <td class="p-4 font-bold text-white">$${inv.amount}</td>
                                <td class="p-4">
                                    <span class="bg-emerald-500/10 text-emerald-400 text-xs px-2 py-1 rounded-full border border-emerald-500/20">${inv.status}</span>
                                </td>
                                <td class="p-4">
                                    <button onclick="deleteInvoice('${inv.id}')" class="text-red-400 hover:text-red-300 transition-colors p-2 hover:bg-red-500/10 rounded-lg">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) {}
        }

        loadDashboardData();
    </script>
</body>
</html>
