<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBill | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-gray-200 min-h-screen p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 md:col-span-1">
            <h2 class="text-2xl font-bold mb-6 text-cyan-400">Create Invoice</h2>
            <form id="invoiceForm" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Client Name</label>
                    <input type="text" id="clientName" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-sm mb-1">Client Email</label>
                    <input type="email" id="clientEmail" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-sm mb-1">Client Phone</label>
                    <input type="tel" id="clientPhone" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-sm mb-1">Service Description</label>
                    <input type="text" id="serviceDesc" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-sm mb-1">Amount (R)</label>
                    <input type="number" id="amount" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-2 px-4 rounded transition duration-200">
                    Generate & Send PDF
                </button>
            </form>
            <p id="statusMsg" class="mt-4 text-sm hidden"></p>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 md:col-span-2">
            <h2 class="text-2xl font-bold mb-6 text-white">Recent Invoices</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="p-3">ID</th>
                            <th class="p-3">Client</th>
                            <th class="p-3">Service</th>
                            <th class="p-3">Amount</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Handle Form Submission
        document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = "Processing & Sending...";
            statusMsg.className = "mt-4 text-sm text-yellow-400 block";

            const payload = {
                clientName: document.getElementById('clientName').value,
                clientEmail: document.getElementById('clientEmail').value,
                clientPhone: document.getElementById('clientPhone').value,
                serviceDesc: document.getElementById('serviceDesc').value,
                amount: document.getElementById('amount').value,
            };

            try {
                const response = await fetch('http://localhost:3000/api/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    statusMsg.textContent = "Invoice Sent Successfully!";
                    statusMsg.className = "mt-4 text-sm text-emerald-400 block";
                    document.getElementById('invoiceForm').reset();
                    loadDashboardData(); // Refresh table
                }
            } catch (err) {
                statusMsg.textContent = "Error sending invoice.";
                statusMsg.className = "mt-4 text-sm text-red-400 block";
            }
        });

        // Load Dashboard Data
        async function loadDashboardData() {
            const response = await fetch('http://localhost:3000/api/invoices');
            const data = await response.json();
            const tbody = document.getElementById('invoiceTableBody');
            tbody.innerHTML = '';
            
            data.forEach(inv => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-700/20">
                        <td class="p-3 text-cyan-400">${inv.id}</td>
                        <td class="p-3">
                            <div class="font-medium">${inv.clientName}</div>
                            <div class="text-xs text-slate-400">${inv.clientEmail}</div>
                        </td>
                        <td class="p-3">${inv.serviceDesc}</td>
                        <td class="p-3 font-bold">$${inv.amount}</td>
                        <td class="p-3"><span class="bg-emerald-500/20 text-emerald-400 text-xs px-2 py-1 rounded">${inv.status}</span></td>
                    </tr>
                `;
            });
        }

        // Initial Load
        loadDashboardData();
    </script>
</body>
</html>
